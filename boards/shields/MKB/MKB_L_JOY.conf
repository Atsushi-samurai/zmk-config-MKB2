# Analog input settings for sensors
CONFIG_ADC=y
CONFIG_ADC_ASYNC=y
CONFIG_ANALOG_INPUT=y

# 報告間隔をさらに短縮（12 -> 8）してレスポンスを最大化
CONFIG_ANALOG_INPUT_REPORT_INTERVAL_MIN=8

# マウス・スクロール機能を有効化
CONFIG_ZMK_MOUSE=y

# ※注意: CONFIG_ZMK_MOUSE_SMOOTH_SCROLL_SENSITIVITY_X/Y は未定義エラーのため削除済み

# デバッグログ（安定したらnを推奨）
CONFIG_ANALOG_INPUT_LOG_LEVEL_DBG=y
CONFIG_ANALOG_INPUT_LOG_DBG_RAW=n
CONFIG_ANALOG_INPUT_LOG_DBG_REPORT=n
