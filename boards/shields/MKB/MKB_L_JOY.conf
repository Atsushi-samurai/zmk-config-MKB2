# Analog input settings for sensors
CONFIG_ADC=y
CONFIG_ADC_ASYNC=y[cite: 5]
CONFIG_ANALOG_INPUT=y[cite: 5]

# 報告間隔を短くしてスティックのレスポンスを向上（22から12に変更）
CONFIG_ANALOG_INPUT_REPORT_INTERVAL_MIN=12

# マウス・スクロール機能を有効化
CONFIG_ZMK_MOUSE=y

# デバッグログ（必要なければnで問題ありません）
CONFIG_ANALOG_INPUT_LOG_LEVEL_DBG=y[cite: 5]
CONFIG_ANALOG_INPUT_LOG_DBG_RAW=n[cite: 5]
CONFIG_ANALOG_INPUT_LOG_DBG_REPORT=n[cite: 5]
