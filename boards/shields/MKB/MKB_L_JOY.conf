# Analog input settings for sensors
CONFIG_ADC=y
CONFIG_ADC_ASYNC=y
CONFIG_ANALOG_INPUT=y

# 報告間隔を短くしてスティックのレスポンスを向上
CONFIG_ANALOG_INPUT_REPORT_INTERVAL_MIN=12

# マウス・スクロール機能を有効化
CONFIG_ZMK_MOUSE=y

# スクロール感度（移動量）の大幅な向上
# デフォルト値から数値を上げることで、1入力あたりのスクロール量が増えます
CONFIG_ZMK_MOUSE_SMOOTH_SCROLL_SENSITIVITY_X=100
CONFIG_ZMK_MOUSE_SMOOTH_SCROLL_SENSITIVITY_Y=100

# デバッグログ（必要なければnで問題ありません）
CONFIG_ANALOG_INPUT_LOG_LEVEL_DBG=y
CONFIG_ANALOG_INPUT_LOG_DBG_RAW=n
CONFIG_ANALOG_INPUT_LOG_DBG_REPORT=n
